name: CrownOps CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node --check apps/backend/src/server.js
