name: LaunchGenie Daily Push

on:
  schedule:
    - cron: "0 9 * * *"  # runs daily at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Generate report
        run: node scripts/generateDaily.js

      - name: Commit & Push
        run: |
          git config --global user.name "LaunchGenie Bot"
          git config --global user.email "bot@launchgenie.ai"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "auto: daily report $(date +'%Y-%m-%d')"
          git push
